<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背單字程式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-image: url('https://img.natgeomedia.com/userfiles/sm/sm1920_images_A1/948/97107786342.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        
        .container {
            padding: 2rem;
            max-width: 95%;
            width: 700px;
            animation: fadeIn 1.5s ease-out;
        }
        
        h1 {
            font-size: 4.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            animation: titleGlow 3s infinite alternate;
        }
        
        .description {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.5s forwards;
        }
        
        .description p {
            margin-bottom: 0.8rem;
        }
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 18px 45px;
            font-size: 1.6rem;
            background-color: transparent;
            color: white;
            border: 3px solid white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            animation: float 3s infinite ease-in-out;
        }
        
        .btn:nth-child(2) {
            animation-delay: 0.5s;
        }
        
        .btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4);
        }
        
        .btn:active {
            transform: translateY(-3px);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }
        
        @keyframes titleGlow {
            0% {
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            }
            100% {
                text-shadow: 0 0 30px rgba(255, 255, 255, 1);
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 3.5rem;
                margin-bottom: 1.5rem;
            }
            
            .description {
                font-size: 1.3rem;
                margin-bottom: 2rem;
            }
            
            .btn {
                padding: 15px 35px;
                font-size: 1.4rem;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .description {
                font-size: 1.1rem;
            }
            
            .buttons {
                flex-direction: column;
                align-items: center;
                gap: 25px;
            }
            
            .btn {
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>背Damn字</h1>
        <div class="description">
            <p>Help you be damn</p>
        </div>
        <div class="buttons">
            <a href="test.html" class="btn">開始</a>
            <a href="legacy.html" class="btn">經典版</a>
        </div>
    </div>
</body>
</html>
